services:
  app:
    build: .
    container_name: paid-blog-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - url=http://localhost:3000
      # SQLite via Knex (Ghost default)
      - database__client=sqlite3
      - database__connection__filename=/app/ghost/content/data/ghost.db
    volumes:
      # SQLite database + images + themes persist here
      - ghost_content:/app/ghost/content

volumes:
  ghost_content:
