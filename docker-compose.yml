services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://admin:password@mongo:27017/blogDB?authSource=admin
      PORT: 3000
      SERVER_PRIVATE_KEY: ${SERVER_PRIVATE_KEY:-}
      BSV_NETWORK: ${BSV_NETWORK:-main}
      BSV_STORAGE_URL: ${BSV_STORAGE_URL:-https://store-us-1.bsvb.tech}
      POST_PRICE_SATS: ${POST_PRICE_SATS:-10}
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"

volumes:
  mongo-data:
